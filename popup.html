<!DOCTYPE html>
<html style="width: 450px; background-color: #0e0e10;">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
	
	html {
    height: 100%;
    width: 100%; /* Remove the hardcoded 450px from the tag */
    background-color: #0e0e10;
    margin: 0;
    padding: 0;
}
	
        body {
            width: 340px;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0e0e10;
            color: #efeff1;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }


.scroll-area {
    flex-grow: 1;
    overflow-y: auto; /* Scrollbar appears here when content is tall */
    padding: 15px;
    min-height: 0; /* CRITICAL: Allows flex items to shrink below content size */
}


        /* Fixed Top Section */
        .header-wrapper {
            padding: 15px 15px 0 15px;
            background-color: #0e0e10;
            z-index: 1000;
            border-bottom: 1px solid #1f1f23;
        }

        .user-settings {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .search-container {
            display: flex;
            gap: 8px;
            padding-bottom: 15px; /* Spacing before emotes start */
        }

        /* The Only Scrolling Part */
        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        input {
            flex-grow: 1;
            padding: 8px 12px;
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        input:focus { outline: none; border-color: #bf94ff; }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            background: #35353b;
            transition: background 0.15s;
        }

        #load-btn:hover { background: #9147ff; }
        #clear-btn:hover { background: #eb0400; }

        .status-msg { font-size: 11px; color: #adadb8; margin-bottom: 8px; }

        .emote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }

        .emote-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1f1f23;
            padding: 10px;
            border-radius: 6px;
            transition: transform 0.1s ease, background 0.2s;
            cursor: pointer;
        }

        .emote-card:hover {
            background: #26262c;
            transform: translateY(-2px);
        }

        .emote-image {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .emote-name {
            font-size: 11px;
            color: #efeff1;
            word-break: break-all;
            text-align: center;
        }

        /* Scrollbar styling for a Twitch feel */

        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-track { background: #0e0e10; }
        .scroll-area::-webkit-scrollbar-thumb { background: #35353b; border-radius: 4px; }
        .scroll-area::-webkit-scrollbar-thumb:hover { background: #464649; }
		

		
		.icon-btn {
			background: transparent;
			border: 1px solid rgba(255, 255, 255, 0.3);
			border-radius: 4px;
			padding: 4px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background 0.2s;
		}

		.icon-btn:hover {
			background: rgba(255, 255, 255, 0.1);
			border-color: white;
		}

		
		
		
    </style>
</head>
<body>
    <!-- FIXED HEADER -->
    <div class="header-wrapper">
        <div class="user-settings">
            <input type="text" id="user-input" placeholder="Twitch Username">
            <button id="load-btn">Load</button>
			<button id="logoutBtn" class="icon-btn" style="display:none;" title="Log Out">×</button>
        </div>
        <div id="status-display" class="status-msg"></div>

        <div class="search-container">
            <input type="text" id="search-box" placeholder="Search emotes...">
            <button id="clear-btn">×</button>
        </div>
    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="scroll-area">
        <div id="emote-grid" class="emote-grid"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
